name: CI

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup MSVC
        uses: iShark5060/actions-msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Validate
        shell: pwsh
        run: ./scripts/validate.ps1
