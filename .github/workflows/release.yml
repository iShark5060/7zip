name: 7-Zip Release

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 26.02). Leave empty to use LATEST.VER.
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a pre-release
        required: false
        type: boolean
        default: false
      draft:
        description: Create the GitHub release as a draft
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
      archive_name: ${{ steps.resolve.outputs.archive_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve release version
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          elif [ -f LATEST.VER ]; then
            version="$(tr -d '[:space:]' < LATEST.VER)"
          else
            echo "ERROR: No version input and LATEST.VER is missing."
            exit 1
          fi

          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version must match X.YY (got '$version')."
            exit 1
          fi

          version_compact="${version//./}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
          echo "archive_name=7zip-$version-win64.zip" >> "$GITHUB_OUTPUT"
          echo "Resolved release version $version (tag $version, archive 7zip-$version-win64.zip)"

  build:
    runs-on: windows-latest
    timeout-minutes: 60

    needs: [prepare]

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Release binaries
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Push-Location CPP/7zip
          nmake PLATFORM=x64
          Pop-Location
          Get-ChildItem CPP/7zip -Recurse -Include *.exe,*.dll,*.sfx | Select-Object FullName

      - name: Package release archive
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:RELEASE_VERSION
          $stage = "dist/7zip-$version-win64"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null

          $shipped = Get-Content build/shipped_win64.txt | Where-Object { $_.Trim() -ne '' }
          foreach ($name in $shipped) {
            $fileName = $name.Trim()
            $match = Get-ChildItem -Path CPP/7zip -Recurse -File -Filter $fileName |
              Where-Object { $_.DirectoryName -match '\\x64$' } |
              Select-Object -First 1
            if (-not $match) {
              throw "Expected shipped binary is missing: $fileName"
            }
            Copy-Item $match.FullName (Join-Path $stage $fileName)
          }

          foreach ($extra in @('DOC/readme.txt', 'DOC/License.txt', 'DOC/src-history.txt')) {
            if (-not (Test-Path $extra)) {
              throw "Expected release file is missing: $extra"
            }
            $destName = Split-Path $extra -Leaf
            Copy-Item $extra (Join-Path $stage $destName)
          }

          $archive = "dist/7zip-$version-win64.zip"
          if (Test-Path $archive) { Remove-Item $archive }
          Compress-Archive -Path "$stage/*" -DestinationPath $archive
          Get-ChildItem dist

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: dist/${{ needs.prepare.outputs.archive_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: 7zip-win64-${{ needs.prepare.outputs.version }}
          path: dist/${{ needs.prepare.outputs.archive_name }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: [prepare, build]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download release artifact
        uses: actions/download-artifact@v8
        with:
          name: 7zip-win64-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Publish GitHub release
        uses: iShark5060/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: 7-Zip ${{ needs.prepare.outputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: dist/${{ needs.prepare.outputs.archive_name }}
          fail_on_unmatched_files: true

  discord-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: [prepare, build, release]
    if: ${{ always() }}

    steps:
      - name: Send Discord status
        if: ${{ env.DISCORD_WEBHOOK != '' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: iShark5060/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ contains(needs.*.result, 'failure') && 'failure' || contains(needs.*.result, 'cancelled') && 'cancelled' || contains(needs.*.result, 'skipped') && 'skipped' || 'success' }}
          content: '<@${{ secrets.DISCORD_USERID }}>'
          title: ${{ github.workflow }}
          description: ${{ contains(needs.*.result, 'failure') && format('Release {0} failed. Review workflow logs before retrying.', needs.prepare.outputs.version) || contains(needs.*.result, 'cancelled') && format('Release {0} was cancelled.', needs.prepare.outputs.version) || contains(needs.*.result, 'skipped') && format('Release {0} was skipped.', needs.prepare.outputs.version) || format('Release {0} succeeded. Windows x64 build is published with artifact attestation.', needs.prepare.outputs.version) }}
          color: ${{ contains(needs.*.result, 'failure') && '0xff0000' || contains(needs.*.result, 'cancelled') && '0xffaa00' || contains(needs.*.result, 'skipped') && '0x808080' || '0x00ff00' }}
